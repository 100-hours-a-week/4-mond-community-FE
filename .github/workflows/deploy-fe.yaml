name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'html/**'
      - 'css/**'
      - 'js/**'
      - '.github/workflows/deploy-fe.yml'

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate config.js
        run: |
          echo "window.__APP_CONFIG__ = {\"API_BASE_URL\": \"${{ secrets.API_BASE_URL }}\"};" > config.js
          cat config.js

- name: Sync static assets to S3
  run: |
    aws s3 sync . s3://${{ env.S3_BUCKET }} \
      --delete \
      --exclude "config.js" \
      --exclude ".git/*" \
      --exclude ".github/*" \
      --exclude "node_modules/*" \
      --exclude "app.js" \
      --exclude "package*.json" \
      --exclude ".env*" \
      --exclude "*.html" \
      --cache-control "public, max-age=86400"

- name: Sync HTML files with no-cache
  run: |
    aws s3 sync . s3://${{ env.S3_BUCKET }} \
      --exclude "*" \
      --include "*.html" \
      --cache-control "no-cache"

      - name: Upload config.js (no-cache)
        run: |
          aws s3 cp config.js s3://${{ env.S3_BUCKET }}/config.js \
            --cache-control "no-store"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"